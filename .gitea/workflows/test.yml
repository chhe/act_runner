name: checks
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.2
      - uses: actions/setup-go@v5.0.0
        with:
          go-version-file: 'go.mod'
      - name: vet checks
        run: make vet
      - name: build
        run: make build
      - name: test
        run: make test
