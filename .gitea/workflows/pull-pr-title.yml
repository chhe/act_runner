name: pr-title

on:
  pull_request:
    types:
    - opened
    - edited
    - reopened
    - synchronize
    - ready_for_review

permissions:
  contents: read

jobs:
  lint-pr-title:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version: 24
    - run: make lint-pr-title
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
